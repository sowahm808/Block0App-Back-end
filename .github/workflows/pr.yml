name: pr
on:
  pull_request:
  push:
    branches: [ main, work ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet restore MindUnlocking.sln
      - run: dotnet format MindUnlocking.sln --verify-no-changes --no-restore
      - run: dotnet build MindUnlocking.sln --configuration Release --no-restore
      - run: dotnet test MindUnlocking.sln --configuration Release --no-build
      - run: docker build -t mindunlocking-api:pr .
